<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Square Card (App Icon Style) -->
  <rect x="25" y="25" width="462" height="462" rx="80" fill="#FFFF00"/>
  <rect x="25" y="25" width="462" height="462" rx="80" stroke="black" stroke-width="32"/>
  
  <!-- Banana / Graph Hybrid Shape -->
  <!-- Upper Curve (The Nano Banana part) -->
  <path d="M120 280C120 213.726 186.274 160 256 160C325.726 160 392 213.726 392 280V320" stroke="black" stroke-width="50" stroke-linecap="square"/>
  
  <!-- Lower Platform (Software/System platform) -->
  <rect x="120" y="320" width="272" height="60" fill="black" stroke="black" stroke-width="12"/>
  
  <!-- "Software Window" three dots (Brutalist style) -->
  <circle cx="170" cy="350" r="15" fill="#FF00FF"/>
  <circle cx="210" cy="350" r="15" fill="#00FFFF"/>
  <circle cx="250" cy="350" r="15" fill="white"/>
  
  <!-- Shadow (Brutalist Shadow) -->
  <rect x="100" y="100" width="462" height="462" rx="80" fill="black" fill-opacity="0.1" style="mix-blend-mode:multiply"/>
</svg>
